<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a1a2e">
  <title>ICC Lesson Log</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      padding: 16px;
      padding-top: env(safe-area-inset-top, 16px);
    }

    .container { max-width: 400px; margin: 0 auto; }

    h1 {
      font-size: 1.4rem;
      margin-bottom: 20px;
      text-align: center;
      color: #4ecca3;
    }

    .form-group { margin-bottom: 14px; }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      margin-bottom: 6px;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input, textarea, select {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #333;
      border-radius: 10px;
      background: #16213e;
      color: #eee;
      font-size: 1rem;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }

    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: #4ecca3;
    }

    textarea { resize: vertical; min-height: 60px; }

    .btn-row {
      display: flex;
      gap: 8px;
    }

    .toggle-btn {
      flex: 1;
      padding: 11px 8px;
      border: 1px solid #333;
      border-radius: 10px;
      background: #16213e;
      color: #eee;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .toggle-btn.active {
      background: #4ecca3;
      color: #1a1a2e;
      border-color: #4ecca3;
    }

    .toggle-btn.guest-active {
      background: #e74c3c;
      color: #fff;
      border-color: #e74c3c;
    }

    .toggle-btn.member-active {
      background: #2ecc71;
      color: #fff;
      border-color: #2ecc71;
    }

    .toggle-btn.half-active {
      background: #f39c12;
      color: #1a1a2e;
      border-color: #f39c12;
    }

    .submit-btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 10px;
      background: #4ecca3;
      color: #1a1a2e;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 20px;
      transition: all 0.2s;
    }

    .submit-btn:active { transform: scale(0.97); opacity: 0.9; }
    .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .status {
      text-align: center;
      margin-top: 12px;
      font-size: 0.9rem;
      min-height: 24px;
    }

    .status.success { color: #4ecca3; }
    .status.error { color: #e74c3c; }

    .settings-toggle { text-align: center; margin-top: 28px; }

    .settings-toggle button {
      background: none;
      border: none;
      color: #666;
      font-size: 0.8rem;
      cursor: pointer;
      text-decoration: underline;
    }

    .settings {
      display: none;
      margin-top: 16px;
      padding: 16px;
      background: #16213e;
      border-radius: 10px;
    }

    .settings.visible { display: block; }
    .settings input, .settings select { margin-bottom: 12px; }

    .settings .save-btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #333;
      color: #eee;
      font-size: 0.9rem;
      cursor: pointer;
    }

    .recent-log {
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid #333;
    }

    .recent-log h2 {
      font-size: 0.8rem;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }

    .log-entry {
      padding: 10px 12px;
      background: #16213e;
      border-radius: 8px;
      margin-bottom: 6px;
      font-size: 0.82rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .log-entry .client-name { font-weight: 600; color: #4ecca3; }
    .log-entry .meta { color: #888; margin-top: 2px; font-size: 0.78rem; }
    .log-entry .badge {
      padding: 3px 8px;
      border-radius: 6px;
      font-size: 0.7rem;
      font-weight: 700;
      flex-shrink: 0;
    }
    .badge-guest { background: #e74c3c; color: #fff; }
    .badge-member { background: #2ecc71; color: #fff; }

    .people-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .people-row button {
      width: 40px;
      height: 40px;
      border: 1px solid #333;
      border-radius: 10px;
      background: #16213e;
      color: #eee;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .people-row button:active { background: #4ecca3; color: #1a1a2e; }

    .people-count {
      font-size: 1.1rem;
      font-weight: 700;
      min-width: 24px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>ICC Lesson Log</h1>

    <form id="lessonForm">
      <div class="form-group">
        <label>Date</label>
        <input type="date" id="lessonDate">
      </div>

      <div class="form-group">
        <label>Client Name</label>
        <input type="text" id="client" placeholder="Client name" required autocomplete="off">
      </div>

      <div class="form-group">
        <label>Guest / Member</label>
        <div class="btn-row">
          <button type="button" class="toggle-btn guest-active" id="guestBtn" onclick="setGuestMember('GUEST')">Guest</button>
          <button type="button" class="toggle-btn" id="memberBtn" onclick="setGuestMember('MEMBER')">Member</button>
        </div>
      </div>

      <div class="form-group">
        <label>Duration</label>
        <div class="btn-row">
          <button type="button" class="toggle-btn" data-duration="30 minutes">30m</button>
          <button type="button" class="toggle-btn active" data-duration="1 hour">1 hr</button>
          <button type="button" class="toggle-btn" data-duration="1.5 hours">1.5 hr</button>
          <button type="button" class="toggle-btn" data-duration="2 hours">2 hr</button>
        </div>
      </div>

      <div class="form-group">
        <label>People</label>
        <div class="people-row">
          <button type="button" onclick="adjustPeople(-1)">-</button>
          <span class="people-count" id="peopleCount">1</span>
          <button type="button" onclick="adjustPeople(1)">+</button>
        </div>
      </div>

      <div class="form-group">
        <label>Rate</label>
        <div class="btn-row">
          <button type="button" class="toggle-btn active" data-rate="FULL" onclick="setRate('FULL', this)">Full</button>
          <button type="button" class="toggle-btn" data-rate="HALF OFF" onclick="setRate('HALF OFF', this)">Half Off</button>
        </div>
      </div>

      <div class="form-group">
        <label>Notes <span style="color:#666">(optional)</span></label>
        <textarea id="notes" placeholder="Quick notes..."></textarea>
      </div>

      <button type="submit" class="submit-btn" id="submitBtn">Log Lesson</button>
    </form>

    <div class="status" id="status"></div>

    <div class="recent-log" id="recentLog"></div>

    <div class="settings-toggle">
      <button onclick="toggleSettings()">Settings</button>
    </div>

    <div class="settings" id="settings">
      <label>Your Name</label>
      <select id="proName">
        <option value="">Select pro...</option>
        <option value="J.C.">J.C.</option>
        <option value="Joey">Joey</option>
        <option value="Matt">Matt</option>
      </select>
      <label>Google Script URL</label>
      <input type="url" id="scriptUrl" placeholder="https://script.google.com/macros/s/...">
      <button class="save-btn" onclick="saveSettings()">Save Settings</button>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'iccLessonLog';

    let settings = JSON.parse(localStorage.getItem(`${STORAGE_KEY}_settings`) || '{}');
    let recentLessons = JSON.parse(localStorage.getItem(`${STORAGE_KEY}_recent`) || '[]');
    let selectedDuration = '1 hour';
    let selectedGuestMember = 'GUEST';
    let selectedRate = 'FULL';
    let peopleCount = 1;

    const today = new Date();
    const dateStr = today.getFullYear() + '-' +
      String(today.getMonth() + 1).padStart(2, '0') + '-' +
      String(today.getDate()).padStart(2, '0');
    document.getElementById('lessonDate').value = dateStr;

    document.getElementById('proName').value = settings.proName || '';
    document.getElementById('scriptUrl').value = settings.scriptUrl || '';

    document.querySelectorAll('[data-duration]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('[data-duration]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedDuration = btn.dataset.duration;
      });
    });

    function setGuestMember(val) {
      selectedGuestMember = val;
      const gBtn = document.getElementById('guestBtn');
      const mBtn = document.getElementById('memberBtn');
      gBtn.className = 'toggle-btn' + (val === 'GUEST' ? ' guest-active' : '');
      mBtn.className = 'toggle-btn' + (val === 'MEMBER' ? ' member-active' : '');
    }

    function setRate(val, btn) {
      selectedRate = val;
      document.querySelectorAll('[data-rate]').forEach(b => {
        b.classList.remove('active', 'half-active');
      });
      if (val === 'HALF OFF') {
        btn.classList.add('half-active');
      } else {
        btn.classList.add('active');
      }
    }

    function adjustPeople(delta) {
      peopleCount = Math.max(1, Math.min(10, peopleCount + delta));
      document.getElementById('peopleCount').textContent = peopleCount;
    }

    document.getElementById('lessonForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const client = document.getElementById('client').value.trim();
      const notes = document.getElementById('notes').value.trim();
      const lessonDate = document.getElementById('lessonDate').value;
      const submitBtn = document.getElementById('submitBtn');
      const status = document.getElementById('status');

      if (!client) return;

      if (!settings.scriptUrl) {
        status.textContent = 'Set your Google Script URL in Settings first';
        status.className = 'status error';
        return;
      }

      if (!settings.proName) {
        status.textContent = 'Select your name in Settings first';
        status.className = 'status error';
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Logging...';
      status.textContent = '';

      const dateParts = lessonDate.split('-');
      const displayDate = dateParts[1] + '/' + dateParts[2] + '/' + dateParts[0].slice(2);

      let displayDuration = selectedDuration;
      if (selectedRate === 'HALF OFF') {
        displayDuration = 'HALF OFF ' + selectedDuration;
      }
      if (peopleCount > 1) {
        displayDuration += ' ' + peopleCount + ' people';
      }

      const payload = {
        date: displayDate,
        pro: settings.proName,
        client,
        guestMember: selectedGuestMember,
        duration: displayDuration,
        people: peopleCount,
        rate: selectedRate,
        notes
      };

      try {
        const response = await fetch(settings.scriptUrl, {
          method: 'POST',
          body: JSON.stringify(payload)
        });

        const result = await response.json();

        if (result.result === 'success') {
          status.textContent = 'Logged!';
          status.className = 'status success';

          recentLessons.unshift({ ...payload, time: new Date().toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' }) });
          if (recentLessons.length > 15) recentLessons.pop();
          localStorage.setItem(`${STORAGE_KEY}_recent`, JSON.stringify(recentLessons));
          renderRecent();

          document.getElementById('client').value = '';
          document.getElementById('notes').value = '';
          peopleCount = 1;
          document.getElementById('peopleCount').textContent = '1';
          setRate('FULL', document.querySelector('[data-rate="FULL"]'));
          document.getElementById('client').focus();
        } else {
          throw new Error(result.message || 'Unknown error');
        }
      } catch (err) {
        status.textContent = 'Failed — check URL or connection';
        status.className = 'status error';
        console.error(err);
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Log Lesson';
      }
    });

    function toggleSettings() {
      document.getElementById('settings').classList.toggle('visible');
    }

    function saveSettings() {
      settings.proName = document.getElementById('proName').value;
      settings.scriptUrl = document.getElementById('scriptUrl').value.trim();
      localStorage.setItem(`${STORAGE_KEY}_settings`, JSON.stringify(settings));
      document.getElementById('settings').classList.remove('visible');
      document.getElementById('status').textContent = 'Settings saved';
      document.getElementById('status').className = 'status success';
    }

    function renderRecent() {
      const container = document.getElementById('recentLog');
      if (recentLessons.length === 0) {
        container.innerHTML = '';
        return;
      }
      container.innerHTML = `
        <h2>Recent Lessons</h2>
        ${recentLessons.map(l => `
          <div class="log-entry">
            <div>
              <div class="client-name">${l.client}</div>
              <div class="meta">${l.duration}${l.notes ? ' · ' + l.notes.substring(0, 30) : ''} · ${l.time}</div>
            </div>
            <span class="badge ${l.guestMember === 'GUEST' ? 'badge-guest' : 'badge-member'}">${l.guestMember}</span>
          </div>
        `).join('')}
      `;
    }

    renderRecent();

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }
  </script>
</body>
</html>
